# Deploys the PWA to GitHub Pages on every push to main.
# One-time setup after pushing this repo to GitHub:
#   Settings → Pages → Source: "GitHub Actions"
# The app will be served at https://<user>.github.io/<repo>/ over HTTPS,
# which is all a PWA needs for install + offline on iOS/Android.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - name: Build with repo sub-path as base
        env:
          BASE_PATH: /${{ github.event.repository.name }}/
          # Optional friends-only passcode: set the ACCESS_CODE secret in
          # Settings → Secrets and variables → Actions. Leave unset to disable.
          VITE_ACCESS_CODE: ${{ secrets.ACCESS_CODE }}
          # Bundled sync defaults (Settings → Secrets and variables → Actions
          # → Variables tab). With these set, friends get the desktop-like
          # UX: Drive needs only the login button, Notion only token+page.
          # Both values are public in the JS bundle by nature — not secrets.
          VITE_GOOGLE_CLIENT_ID: ${{ vars.GOOGLE_CLIENT_ID }}
          VITE_NOTION_PROXY_URL: ${{ vars.NOTION_PROXY_URL }}
        run: npx vite build && node scripts/inject-sw-precache.mjs
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
